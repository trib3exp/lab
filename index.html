<!DOCTYPE html>
<html>
<head>
  <title>TRIB3 LAB</title>
</head>
<body style="background:black; color:white; font-family:sans-serif;">

<h1>🚀 TRIB3 LAB PROJECTS</h1>
<div id="projects">Loading projects...</div>

<script>
fetch("https://api.github.com/users/trib3exp/repos")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("projects");
    container.innerHTML = "";

    data.forEach(repo => {
      if (repo.name !== "lab") {
        const div = document.createElement("div");
        div.innerHTML = `
          <h3>${repo.name}</h3>
          <a href="${repo.html_url}" target="_blank">View Code</a>
          <hr>
        `;
        container.appendChild(div);
      }
    });
  })
  .catch(err => {
    document.getElementById("projects").innerHTML = "❌ Error loading projects";
  });
</script>

</body>
</html>
