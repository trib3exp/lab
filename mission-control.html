<style>
:root{
--bg:#0b1019;--card:#111b27;--panel:#0d1420;--border:#1a2332;--border2:#131d29;
--white:#e8edf2;--text:#b8c4d0;--muted:#5a6a7a;--dim:#4a6070;--dark:#3a4a5a;
--cyan:#00d4ff;--green:#00c853;--red:#ff4d6a;--amber:#ffb74d;--purple:#7c4dff;--orange:#ff8a65;
--mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
--sans:'DM Sans',-apple-system,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:var(--sans);overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select{font-family:var(--mono);background:var(--bg);color:var(--white);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;outline:none;}
input:focus,select:focus{border-color:var(--cyan);}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none;}
/* Layout */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:100;}
.sidebar .logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sidebar .logo h1{font-family:var(--mono);font-size:12px;font-weight:800;color:var(--cyan);letter-spacing:.08em;margin:0;}
.sidebar .logo p{font-family:var(--mono);font-size:8px;color:var(--dark);letter-spacing:.12em;margin:2px 0 0;}
.sidebar nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sidebar nav .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;margin-bottom:2px;cursor:pointer;color:var(--muted);font-size:12.5px;font-weight:400;border:1px solid transparent;transition:all .15s;}
.sidebar nav .nav-item:hover{color:var(--text);background:rgba(0,212,255,.04);}
.sidebar nav .nav-item.active{color:var(--cyan);background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.15);font-weight:600;}
.sidebar nav .nav-item svg{flex-shrink:0;}
.sidebar .foot{padding:10px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--dark);font-family:var(--mono);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:var(--panel);flex-shrink:0;}
.topbar .left{display:flex;align-items:center;gap:10px;}
.topbar .title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar .right{display:flex;align-items:center;gap:12px;}
.topbar .search-box{position:relative;}
.topbar .search-box input{width:220px;padding-left:32px;font-family:var(--sans);font-size:12px;}
.topbar .search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);}
.topbar .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--green));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--bg);}
.topbar .bell{position:relative;cursor:pointer;color:var(--muted);}
.topbar .bell .dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);}
.content{flex:1;overflow:auto;padding:22px;-webkit-overflow-scrolling:touch;}
.hamburger{display:none;cursor:pointer;color:var(--muted);padding:4px;}
/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;}
/* Cards */
.crd{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.crd-title{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
/* Grid */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
/* Metric */
.met .met-label{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.met .met-value{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--white);line-height:1.1;}
.met .met-change{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-family:var(--mono);font-weight:600;}
.met .met-sub{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px;}
/* Badge */
.bdg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap;letter-spacing:.02em;}
.bdg-green{background:rgba(0,200,83,.15);color:#00c853;}
.bdg-red{background:rgba(255,77,106,.15);color:#ff4d6a;}
.bdg-blue{background:rgba(0,212,255,.15);color:#00d4ff;}
.bdg-amber{background:rgba(255,183,77,.15);color:#ffb74d;}
.bdg-purple{background:rgba(124,77,255,.15);color:#7c4dff;}
.bdg-orange{background:rgba(255,138,101,.15);color:#ff8a65;}
.bdg-gray{background:rgba(100,120,140,.15);color:#8899aa;}
/* Table */
.tbl{width:100%;border-collapse:collapse;min-width:500px;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl th{padding:8px 10px;text-align:right;font-size:10px;font-family:var(--mono);font-weight:700;color:var(--dim);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:10px;text-align:right;font-size:12px;color:var(--text);border-bottom:1px solid var(--border2);white-space:nowrap;}
.tbl td:first-child{text-align:left;color:var(--white);font-weight:600;}
.tbl tr.clickable{cursor:pointer;}
.tbl tr.clickable:hover td{background:rgba(0,212,255,.03);}
.mono{font-family:var(--mono);}
/* Tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;margin-bottom:14px;}
.tab-bar .tab{padding:10px 16px;font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;color:var(--muted);}
.tab-bar .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);font-weight:600;}
/* Kanban */
.kanban{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.kanban .col{min-width:230px;flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;}
.kanban .col-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.kanban .col-hdr .dot{width:8px;height:8px;border-radius:50%;}
.kanban .col-hdr span{font-size:11px;font-family:var(--mono);font-weight:700;color:var(--muted);text-transform:uppercase;}
.kanban .col-hdr .cnt{font-size:11px;font-family:var(--mono);color:var(--dim);}
.kanban .k-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.kanban .k-card h4{font-size:13px;font-weight:600;margin-bottom:4px;}
.kanban .k-card .sub{font-size:11px;color:var(--muted);margin-bottom:6px;}
.kanban .k-card .row{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--muted);}
.kanban .k-card .prob-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;}
.kanban .k-card .prob-bar .fill{height:3px;border-radius:2px;}
/* Insight */
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;border-left-width:3px;}
.ins-card .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.ins-card .body{font-size:12px;color:var(--text);line-height:1.6;}
.ins-card .meta{font-size:10px;color:var(--dim);margin-top:6px;font-family:var(--mono);}
/* Donut */
.donut{position:relative;flex-shrink:0;}
.donut .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;color:var(--white);}
/* View toggle */
.view-btns{display:flex;gap:8px;margin-bottom:12px;}
.view-btns .vb{padding:6px 14px;border-radius:6px;font-size:12px;font-family:var(--mono);cursor:pointer;color:var(--muted);background:transparent;border:1px solid transparent;}
.view-btns .vb.active{color:var(--cyan);background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.15);font-weight:600;}
/* Filter btns */
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.filter-btns .fb{padding:6px 14px;border-radius:6px;font-size:12px;font-family:var(--mono);cursor:pointer;color:var(--muted);background:transparent;border:1px solid transparent;}
.filter-btns .fb.active{color:var(--cyan);background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.15);font-weight:600;}
/* Score bar */
.score-bar{display:flex;align-items:center;gap:8px;}
.score-bar .track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.score-bar .fill{height:100%;border-radius:3px;}
.score-bar .num{font-size:12px;font-family:var(--mono);font-weight:700;min-width:28px;}
/* Back link */
.back-link{font-size:12px;color:var(--cyan);cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:12px;}
/* Import */
.import-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;}
.import-bar label{font-size:12px;font-family:var(--mono);color:var(--cyan);cursor:pointer;padding:6px 14px;border:1px solid rgba(0,212,255,.3);border-radius:6px;background:rgba(0,212,255,.08);}
.import-bar label:hover{background:rgba(0,212,255,.15);}
.import-bar .status{font-size:11px;color:var(--muted);font-family:var(--mono);}
.import-bar input[type=file]{display:none;}
/* SVG spark */
.spark{width:100%;display:block;}
/* Agent card */
.agent-card{border-left-width:3px;border-left-style:solid;}
.agent-card .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.agent-card .desc{font-size:12px;color:var(--muted);margin-bottom:12px;}
.agent-card .tasks .task-row{display:flex;align-items:center;gap:6px;padding:3px 0;}
.agent-card .tasks .task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.agent-card .tasks span{font-size:12px;color:var(--text);}
.agent-card .stats{display:flex;gap:8px;margin-top:12px;}
.agent-card .stat{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 6px;text-align:center;}
.agent-card .stat .sv{font-size:16px;font-weight:800;font-family:var(--mono);}
.agent-card .stat .sl{font-size:8px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;}
/* Sub box */
.sub-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 6px;text-align:center;}
.sub-box .sv{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--white);}
.sub-box .sl{font-size:9px;font-family:var(--mono);color:var(--muted);margin-top:2px;}
/* Prop card */
.prop-card{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;}
.prop-card:hover{border-color:rgba(0,212,255,.2);}
/* Search results */
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-top:4px;z-index:200;max-height:300px;overflow-y:auto;}
.search-results .sr{padding:8px 12px;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;justify-content:space-between;font-size:12px;}
.search-results .sr:hover{background:rgba(0,212,255,.05);}
/* Progress bar */
.prog{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.prog .track{flex:1;height:12px;background:var(--border);border-radius:6px;overflow:hidden;}
.prog .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--green));}
.prog .pct{font-size:13px;font-family:var(--mono);font-weight:700;color:var(--white);}
/* UW input */
.uw-field{margin-bottom:10px;}
.uw-field label{display:block;font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.uw-field .inp-wrap{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;}
.uw-field .inp-wrap input{flex:1;background:transparent;border:none;color:var(--white);font-size:13px;font-family:var(--mono);outline:none;width:60px;}
.uw-field .inp-wrap .pfx,.uw-field .inp-wrap .sfx{font-size:12px;font-family:var(--mono);color:var(--muted);}
/* Responsive */
@media(max-width:1024px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);z-index:100;width:260px;}
  .sidebar.open{transform:translateX(0);}
  .overlay.show{display:block;}
  .hamburger{display:flex;}
  .g4{grid-template-columns:repeat(2,1fr);}
  .topbar{padding:0 12px;}
  .content{padding:16px;}
}
@media(max-width:640px){
  .g2,.g3,.g4{grid-template-columns:1fr;}
  .content{padding:12px;}
  .topbar .search-box{display:none;}
  .topbar .title{font-size:14px;}
}
/* Animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.page-enter{animation:fadeIn .25s ease;}
</style>
</head>

const ff=n=>new Intl.NumberFormat("en-US").format(n);
const fd=n=>"$"+new Intl.NumberFormat("en-US",{maximumFractionDigits:0}).format(n);
const fm=n=>{if(Math.abs(n)>=1e9)return"$"+(n/1e9).toFixed(1)+"B";if(Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return"$"+(n/1e3).toFixed(0)+"K";return"$"+n;};

function bdg(txt,color){return`<span class="bdg bdg-${color}">${txt}</span>`;}
function met(label,value,opts={}){
  let h=`<div class="crd met"><div class="met-label">${label}</div><div class="met-value" style="color:${opts.color||'var(--white)'}">${value}</div>`;
  if(opts.change)h+=`<div class="met-change" style="color:${opts.up?'var(--green)':'var(--red)'}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="${opts.up?'18 15 12 9 6 15':'6 9 12 15 18 9'}"/></svg>${opts.change}</div>`;
  if(opts.sub)h+=`<div class="met-sub">${opts.sub}</div>`;
  return h+"</div>";
}
function spark(data,color="#00d4ff",h=48){
  if(!data||data.length<2)return"";
  const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*200},${h-((v-mn)/rng)*(h-8)-4}`).join(" ");
  const id="sg"+color.replace("#","");
  return`<svg viewBox="0 0 200 ${h}" preserveAspectRatio="none" class="spark" style="height:${h}px"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${pts} 200,${h}" fill="url(#${id})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function donut(val,size=56){
  const c=val>=70?"var(--green)":val>=50?"var(--amber)":"var(--red)";
  const r=(size-8)/2,circ=2*Math.PI*r;
  return`<div class="donut" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${circ-(circ*val)/100}" transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="round"/></svg><div class="val" style="font-size:${size>50?13:10}px">${val}%</div></div>`;
}
function bars(data,labels,color="#00d4ff",h=120,showNeg=false){
  if(!data||!data.length)return"";
  const mx=Math.max(...data.map(Math.abs)),barW=Math.min(24,(200-data.length*2)/data.length);
  const mid=showNeg?h/2:h;
  let s=`<svg viewBox="0 0 200 ${h+20}" preserveAspectRatio="none" class="spark" style="height:${h+20}px">`;
  if(showNeg)s+=`<line x1="0" y1="${mid}" x2="200" y2="${mid}" stroke="var(--border)" stroke-width="1"/>`;
  data.forEach((v,i)=>{
    const x=(i/data.length)*200+(200/data.length-barW)/2;
    const bh=(Math.abs(v)/(mx||1))*(showNeg?mid-4:h-4);
    const y=showNeg?(v>=0?mid-bh:mid):h-bh;
    s+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${v<0?'var(--red)':color}" opacity="0.8"/>`;
    if(labels)s+=`<text x="${x+barW/2}" y="${h+14}" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="var(--mono)">${labels[i]}</text>`;
  });
  return s+"</svg>";
}
function ins(item,compact=false){
  const cm={risk:"red",opportunity:"blue",deal:"green",financial:"amber",market:"amber"};
  const c=cm[item.type]||"gray";
  let h=`<div class="ins-card" style="border-left-color:var(--${c})"><div class="badges">${bdg(item.type.toUpperCase(),c)}${bdg(item.priority.toUpperCase(),item.priority==="high"?"red":"amber")}</div><div class="body">${item.text}</div>`;
  if(!compact&&item.agent)h+=`<div class="meta">${item.agent} · ${Math.round(item.confidence*100)}% confidence</div>`;
  return h+"</div>";
}
function tbl(cols,rows,opts={}){
  let h='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  cols.forEach(c=>h+=`<th>${c.label}</th>`);
  h+="</tr></thead><tbody>";
  rows.forEach(r=>{
    h+=`<tr class="${opts.clickable?'clickable':''}" ${opts.onclick?`onclick="${opts.onclick}(${typeof r.id!=='undefined'?r.id:"'"+r.name+"'"})"`:""}>`;
    cols.forEach((c,i)=>{
      const val=c.render?c.render(r):(r[c.key]||"—");
      h+=`<td class="${c.mono?'mono':''}">${val}</td>`;
    });
    h+="</tr>";
  });
  return h+"</tbody></table></div>";
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      // Properties
      if(wb.SheetNames.includes("Properties")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Properties"]);
        if(rows.length){
          DATA.properties.forEach((p,i)=>{
            if(rows[i]){
              const r=rows[i];
              if(r["Property Name"])p.name=r["Property Name"];
              if(r["Asset Type"])p.type=r["Asset Type"];
              if(r["Total SQFT"])p.sqft=+r["Total SQFT"];
              if(r["Occupancy %"])p.occupancy=Math.round((+r["Occupancy %"])*100)||p.occupancy;
              if(r["Annual Revenue"])p.revenue=+r["Annual Revenue"];
              if(r["Annual Expenses"])p.expenses=+r["Annual Expenses"];
              if(r["NOI"])p.noi=+r["NOI"];
              if(r["Debt Service"])p.debtService=+r["Debt Service"];
              if(r["Cap Rate"])p.capRate=Math.round((+r["Cap Rate"])*1000)/10||p.capRate;
              if(r["Valuation"])p.valuation=+r["Valuation"];
              if(r["DSCR"])p.dscr=+r["DSCR"];
              if(r["Vacant SQFT"])p.vacancy=+r["Vacant SQFT"];
            }
          });
        }
      }
      // Tenants
      if(wb.SheetNames.includes("Tenants")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Tenants"]);
        if(rows.length){
          DATA.properties.forEach(p=>{p.tenants=[];});
          rows.forEach(r=>{
            const prop=DATA.properties.find(p=>p.name===r["Property"]);
            if(prop){
              prop.tenants.push({name:r["Tenant Name"]||"",sqft:+r["SQFT"]||0,rent:+r["Rent/SF"]||0,annual:+r["Annual Rent"]||0,leaseEnd:r["Lease End"]||"",status:(r["Status"]||"active").toLowerCase(),industry:r["Industry"]||"",suite:r["Suite"]||"",contact:r["Contact Name"]||"",email:r["Contact Email"]||"",phone:r["Contact Phone"]||""});
            }
          });
        }
      }
      // Leasing
      if(wb.SheetNames.includes("Leasing Pipeline")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Leasing Pipeline"]);
        if(rows.length){
          DATA.leasing=rows.filter(r=>r["Company"]).map((r,i)=>({id:i+1,company:r["Company"]||"",sqft:+r["SQFT Requested"]||0,rent:+r["Target Rent/SF"]||0,broker:r["Broker"]||"",stage:r["Stage"]||"Lead",property:r["Property"]||"",source:r["Source"]||"",priority:r["Priority"]||"Medium",probability:Math.round((+r["Probability %"]||0)*100)||0}));
        }
      }
      // Deals
      if(wb.SheetNames.includes("Deal Pipeline")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Deal Pipeline"]);
        if(rows.length){
          DATA.deals=rows.filter(r=>r["Address"]).map((r,i)=>({id:i+1,address:r["Address"]||"",market:r["Market"]||"",type:r["Type"]||"",size:+r["Size SQFT"]||0,price:+r["Price"]||0,capRate:Math.round((+r["Cap Rate"]||0)*1000)/10,noi:+r["NOI"]||0,score:+r["AI Score"]||0,stage:r["Stage"]||"",broker:r["Broker"]||"",source:r["Source"]||"",irr:Math.round((+r["Projected IRR"]||0)*1000)/10,equity:+r["Equity Required"]||0,notes:r["Notes"]||""}));
        }
      }
      // Brokers
      if(wb.SheetNames.includes("Brokers")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Brokers"]);
        if(rows.length){
          DATA.brokers=rows.filter(r=>r["Broker Name"]).map(r=>({name:r["Broker Name"]||"",firm:r["Firm"]||"",specialty:r["Specialty"]||"",deals:+r["Total Deals"]||0,volume:+r["Total Volume"]||0,rating:+r["Rating"]||0,market:r["Market"]||"",phone:r["Phone"]||"",email:r["Email"]||"",lastContact:r["Last Contact"]||""}));
        }
      }
      // Investors
      if(wb.SheetNames.includes("Investors")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Investors"]);
        if(rows.length){
          DATA.investors=rows.filter(r=>r["Investor Name"]).map(r=>({name:r["Investor Name"]||"",type:r["Type"]||"",committed:+r["Capital Committed"]||0,deployed:+r["Capital Deployed"]||0,irr:Math.round((+r["Actual IRR"]||0)*1000)/10,status:r["Status"]||"",contact:r["Contact"]||"",email:r["Email"]||"",targetIrr:Math.round((+r["Target IRR"]||0)*1000)/10,distQ4:+r["Q4 2025 Distribution"]||0,distQ1:+r["Q1 2026 Distribution"]||0}));
        }
      }
      // Events
      if(wb.SheetNames.includes("Events")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Events"]);
        if(rows.length){
          DATA.properties.forEach(p=>{if(p.events)p.events=[];});
          rows.forEach(r=>{
            const prop=DATA.properties.find(p=>p.name===r["Property"]);
            if(prop){
              if(!prop.events)prop.events=[];
              prop.events.push({name:r["Event Name"]||"",date:r["Date"]||"",revenue:+r["Revenue"]||0,expenses:+r["Expenses"]||0,attendance:+r["Attendance"]||0,type:r["Type"]||"",status:r["Status"]||"",organizer:r["Organizer"]||"",space:+r["Space SQFT"]||0});
            }
          });
        }
      }
      // Tasks
      if(wb.SheetNames.includes("Tasks")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Tasks"]);
        if(rows.length){
          DATA.tasks=rows.filter(r=>r["Task"]).map(r=>({title:r["Task"]||"",module:r["Module"]||"",priority:r["Priority"]||"Medium",status:r["Status"]||"Open",assignee:r["Assignee"]||"",due:r["Due Date"]||"",property:r["Property"]||""}));
        }
      }
      importStatus=`✅ Imported ${wb.SheetNames.length} sheets from ${file.name}`;
      render();
    }catch(err){
      importStatus="❌ Error: "+err.message;
      render();
    }
  };
  reader.readAsBinaryString(file);
}

  [...all].sort((a,b)=>b.revenue-a.revenue).slice(0,4).forEach(e=>{h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2)"><div><div style="font-size:12px;font-weight:600">${e.name}</div><div style="font-size:10px;color:var(--muted)">${e.date}</div></div><div class="mono" style="font-size:13px;color:var(--green);font-weight:700">${fd(e.revenue)}</div></div>`;});
  h+=`</div></div>`;
  h+=`<div class="crd"><div class="crd-title">All Events</div>${tbl([{label:"Event",key:"name"},{label:"Date",key:"date",mono:true},{label:"Type",render:r=>bdg(r.type,"blue")},{label:"Revenue",mono:true,render:r=>fd(r.revenue)},{label:"Net",mono:true,render:r=>fd(r.revenue-r.expenses)},{label:"Attendance",mono:true,render:r=>ff(r.attendance)},{label:"Property",key:"property"},{label:"Status",render:r=>bdg(r.status,r.status==="Confirmed"?"green":"amber")}],all)}</div>`;
  if(vendors.length){h+=`<div class="crd"><div class="crd-title">Vendor Network</div>${tbl([{label:"Vendor",key:"name"},{label:"Category",render:r=>bdg(r.category,"blue")},{label:"Events",key:"events",mono:true},{label:"Revenue",mono:true,render:r=>fd(r.revenue)},{label:"Status",render:r=>bdg(r.status,"green")}],vendors)}</div>`;}
  return h;
}

function pgMarket(){
  const M=DATA.market,lv=M.vacancy[M.vacancy.length-1],pv=M.vacancy[M.vacancy.length-2],lr=M.rents[M.rents.length-1],pr=M.rents[M.rents.length-2],la=M.absorption[M.absorption.length-1];

  h+=`<div class="g2"><div class="crd"><div class="crd-title">Vacancy (12M)</div>${spark(M.vacancy,"#ff4d6a",80)}</div><div class="crd"><div class="crd-title">Rents (12M)</div>${spark(M.rents,"#00c853",80)}</div></div>`;

  h+=`<div class="crd"><div class="crd-title">Market Alerts</div>${DATA.insights.filter(i=>i.module==="market").map(i=>ins(i)).join("")}</div>`;
  return h;
}

function pgInvestors(){
  const I=DATA.investors,tc=I.reduce((s,i)=>s+i.committed,0),td=I.reduce((s,i)=>s+i.deployed,0),ac=I.filter(i=>i.status!=="Prospective").length;
  const irrs=I.filter(i=>i.irr>0);const ai=irrs.length?(irrs.reduce((s,i)=>s+i.irr,0)/irrs.length).toFixed(1):0;
  const totDist=I.reduce((s,i)=>s+(i.distQ4||0)+(i.distQ1||0),0);
  let h=importBar();
  h+=`<div class="g4">${met("Committed",fm(tc))}${met("Deployed",fm(td),{color:"var(--cyan)"})}${met("Active LPs",ac)}${met("Avg IRR",ai+"%",{color:"var(--green)"})}</div>`;
  h+=`<div class="crd"><div class="crd-title">Investor Portfolio</div>${tbl([{label:"Investor",key:"name"},{label:"Type",render:r=>bdg(r.type,"blue")},{label:"Committed",mono:true,render:r=>fm(r.committed)},{label:"Deployed",mono:true,render:r=>fm(r.deployed)},{label:"IRR",mono:true,render:r=>r.irr>0?r.irr+"%":"—"},{label:"Target",mono:true,render:r=>r.targetIrr+"%"},{label:"Status",render:r=>bdg(r.status,r.status==="Active"?"green":r.status==="Deployed"?"blue":"amber")}],I)}</div>`;
  const pct=tc>0?Math.round(td/tc*100):0;
  h+=`<div class="g2"><div class="crd"><div class="crd-title">Capital Deployment</div><div class="prog"><div class="track"><div class="fill" style="width:${pct}%"></div></div><div class="pct">${pct}%</div></div><div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--muted)"><span>Deployed: ${fm(td)}</span><span>Remaining: ${fm(tc-td)}</span></div></div>`;
  h+=`<div class="crd"><div class="crd-title">Total Distributions</div><div class="mono" style="font-size:24px;font-weight:800;color:var(--green)">${fd(totDist)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Across all investors</div></div></div>`;
  return h;
}

function pgFinancials(){

  h+=`<div class="crd"><div class="crd-title">Financial Summary</div>${tbl([{label:"Property",key:"name"},{label:"Revenue",mono:true,render:r=>fm(r.revenue)},{label:"Expenses",mono:true,render:r=>fm(r.expenses)},{label:"NOI",mono:true,render:r=>fm(r.noi)},{label:"Debt Svc",mono:true,render:r=>fm(r.debtService)},{label:"DSCR",mono:true,render:r=>r.dscr+"x"},{label:"Cap Rate",mono:true,render:r=>r.capRate+"%"}],P)}</div>`;

function pgTasks(){
  const T=DATA.tasks,filtered=taskFilter==="All"?T:T.filter(t=>t.status===taskFilter);
  let h=`<div class="g4">${met("Total Tasks",T.length)}${met("Open",T.filter(t=>t.status==="Open").length)}${met("In Progress",T.filter(t=>t.status==="In Progress").length,{color:"var(--amber)"})}${met("Critical",T.filter(t=>t.priority==="Critical").length,{color:"var(--red)"})}</div>`;

  return h;

function pgUnderwriting(){
  const u=UW;
  const loanAmt=u.purchasePrice*(u.ltvRatio/100),equity=u.purchasePrice-loanAmt,annualDebt=loanAmt*(u.interestRate/100);
  const cashFlow=u.noi-annualDebt,goingInCap=u.purchasePrice>0?((u.noi/u.purchasePrice)*100).toFixed(2):0;
  const cocReturn=equity>0?((cashFlow/equity)*100).toFixed(1):0;
  const projections=[];
  for(let yr=1;yr<=u.holdPeriod;yr++){
    const projNoi=u.noi*Math.pow(1+u.rentGrowth/100,yr);
    projections.push({year:yr,noi:projNoi,cashFlow:projNoi-annualDebt});
  }
  const exitNoi=projections.length?projections[projections.length-1].noi:u.noi;
  const exitValue=u.exitCap>0?exitNoi/(u.exitCap/100):0;
  const totalCf=projections.reduce((s,p)=>s+p.cashFlow,0);
  const equityMultiple=equity>0?((totalCf+(exitValue-loanAmt))/equity).toFixed(2):0;

  function field(label,key,prefix,suffix){
    return`<div class="uw-field"><label>${label}</label><div class="inp-wrap">${prefix?`<span class="pfx">${prefix}</span>`:""}<input type="number" value="${u[key]}" onchange="UW.${key}=parseFloat(this.value)||0;render()">${suffix?`<span class="sfx">${suffix}</span>`:""}</div></div>`;
  }

  let h=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"><span class="mono" style="font-size:12px;color:var(--muted);align-self:center">Load deal:</span>`;
  DATA.deals.filter(d=>d.stage!=="Closed").forEach(d=>{h+=`<div class="vb" style="font-size:11px;padding:4px 10px" onclick="UW.purchasePrice=${d.price};UW.noi=${d.noi};render()">${d.address}</div>`;});
  h+=`</div>`;

  h+=`<div class="g2"><div class="crd"><div class="crd-title">Assumptions</div>${field("Purchase Price","purchasePrice","$","")}${field("NOI","noi","$","")}${field("Rent Growth","rentGrowth","","%")}${field("Expense Ratio","expenseRatio","","%")}${field("Vacancy Loss","vacancyLoss","","%")}${field("Exit Cap Rate","exitCap","","%")}${field("Hold Period","holdPeriod","","yrs")}${field("LTV Ratio","ltvRatio","","%")}${field("Interest Rate","interestRate","","%")}</div>`;
  h+=`<div><div class="g2">${met("Going-In Cap",goingInCap+"%")}${met("Cash-on-Cash",cocReturn+"%",{color:"var(--green)"})}${met("Equity Multiple",equityMultiple+"x",{color:"var(--cyan)"})}${met("Exit Value",fm(exitValue))}</div><div class="g2">${met("Loan Amount",fm(loanAmt))}${met("Equity",fm(equity))}${met("Annual Debt",fm(annualDebt),{color:"var(--red)"})}${met("Year 1 CF",fm(cashFlow),{color:"var(--green)"})}</div></div></div>`;

  let cumCf=0;
  h+=`<div class="crd"><div class="crd-title">Pro Forma Projections</div>${tbl([{label:"Year",key:"year",mono:true},{label:"NOI",mono:true,render:r=>fd(Math.round(r.noi))},{label:"Debt Service",mono:true,render:()=>fd(Math.round(annualDebt))},{label:"Cash Flow",mono:true,render:r=>fd(Math.round(r.cashFlow))},{label:"Cumulative CF",mono:true,render:r=>{cumCf+=r.cashFlow;return fd(Math.round(cumCf));}}],projections)}</div>`;
  return h;
}

function pgAI(){
  const agents=[
    {name:"Leasing AI",desc:"Finds expanding companies, generates outreach, scores prospects.",color:"var(--cyan)",tasks:["Scanning Oakland County expansions","Generating outreach for 3 prospects","Scoring pipeline leads"],stats:[["Prospects","14"],["Emails","32"],["Matches","8"]]},
    {name:"Deal Hunter",desc:"Scans listings for acquisitions.",color:"var(--green)",tasks:["Monitoring 8 feeds","2 off-market flagged","Daily scan done"],stats:[["Deals","6"],["Alerts","15"],["Scored","42"]]},
    {name:"Asset Mgmt",desc:"Occupancy, rollover risk, rent optimization.",color:"var(--amber)",tasks:["Rollover updated","Rent model running","2 risk alerts"],stats:[["Assets","2"],["Insights","8"],["Saved","$142K"]]},
    {name:"Market AI",desc:"Weekly vacancy, rents, absorption reports.",color:"var(--purple)",tasks:["Report generated","5 indicators","Competitor done"],stats:[["Reports","12"],["Markets","4"],["Alerts","6"]]}
  ];
  let h=`<div class="g2">`;
  agents.forEach(a=>{
    h+=`<div class="crd agent-card" style="border-left-color:${a.color}"><div class="hdr"><div style="font-size:16px;font-weight:700">${a.name}</div>${bdg("ACTIVE","green")}</div><div class="desc">${a.desc}</div><div class="tasks">`;
    a.tasks.forEach(t=>{h+=`<div class="task-row"><div class="task-dot" style="background:${a.color}"></div><span>${t}</span></div>`;});
    h+=`</div><div class="stats">`;
    a.stats.forEach(([l,v])=>{h+=`<div class="stat"><div class="sv" style="color:${a.color}">${v}</div><div class="sl">${l}</div></div>`;});
    h+=`</div></div>`;
  });
  h+=`</div>`;
  h+=`<div class="crd"><div class="crd-title">All AI Insights</div>${DATA.insights.map(i=>ins(i)).join("")}</div>`;
  return h;
}

function render(){
  buildNav();
  let title="Dashboard",html="";
  switch(currentPage){
    case"dashboard":title="Dashboard";html=pgDash();break;
    case"portfolio":title="Portfolio";html=pgPortfolio();break;
    case"property":const p=DATA.properties.find(x=>x.id===currentPropId);title=p?p.name:"Property";html=pgProperty();break;
    case"leasing":title="Leasing Command Center";html=pgLeasing();break;
    case"deals":title="Deal Flow Pipeline";html=pgDeals();break;
    case"events":title="Event Monetization";html=pgEvents();break;
    case"market":title="Market Intelligence";html=pgMarket();break;
    case"brokers":title="Broker CRM";html=pgBrokers();break;
    case"investors":title="Investor Portal";html=pgInvestors();break;
    case"financials":title="Financial Command Center";html=pgFinancials();break;
    case"tasks":title="Task Control Center";html=pgTasks();break;
    case"underwriting":title="Underwriting Engine";html=pgUnderwriting();break;
    case"ai":title="AI Agents";html=pgAI();break;
    default:html=pgDash();
  }
  document.getElementById("pageTitle").textContent=title;
  const c=document.getElementById("content");
  c.innerHTML=`<div class="page-enter">${html}</div>`;
  c.scrollTop=0;
}

// Init
render();
</script>
